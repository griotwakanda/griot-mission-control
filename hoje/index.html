<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>24 de fevereiro — Hoje na história</title>
  <meta name="description" content="Papa Gregório XIII revela o novo calendário em 24 de fevereiro de 1582." />
  <style>
    :root {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: #f8f9fb;
      background-color: #0c0f15;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: url('papa-gregory-calendario.png') center/cover no-repeat fixed;
      display: flex;
      align-items: flex-end;
      justify-content: stretch;
    }

    .footer {
      width: 100%;
      padding: 32px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(4, 6, 10, 0.85) 45%, rgba(6, 14, 22, 0.95) 100%);
      text-align: left;
    }

    .footer h1 {
      margin: 0;
      font-size: clamp(2rem, 2.8vw, 2.6rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .footer p {
      margin: 4px 0 0;
      font-size: 1.05rem;
      line-height: 1.5;
      max-width: 960px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 640px) {
      .footer {
        padding: 24px;
      }

      .footer h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="footer">
    <h1>O marco do calendário gregoriano</h1>
    <p>Em 1582, no dia 24 de fevereiro, o Papa Gregório XIII apresentou ao mundo o novo calendário que corrigiu a perda acumulada do ano solar.</p>
  </div>
</body>
</html>
